<div class="login">
  <h2>Iniciar sesión</h2>

  <form (ngSubmit)="login()">
    <input
      type="email"
      placeholder="Correo"
      [(ngModel)]="email"
      name="email"
      required
    />

    <input
      type="password"
      placeholder="Contraseña"
      [(ngModel)]="password"
      name="password"
      required
    />

    <button type="submit">Entrar</button>

    <p class="error" *ngIf="error">{{ error }}</p>
  </form>
</div>
